worker_processes  1;

events {
  worker_connections  1024;
}

http {
  # Redirect rules for landing root URLs based on ?lng=<locale>.
  # English is canonical and stays unprefixed (/ instead of /en).
  map "$uri" $is_landing_locale_root {
    default 0;
    ~^/(?:[a-z][a-z])?/?$ 1;
  }

  map "$is_landing_locale_root:$arg_lng" $landing_redirect {
    default "";
    ~^1:en$ /;
    ~^1:[a-z][a-z]$ /$arg_lng;
  }

  server {
    listen 8080;
    server_name   _;
    absolute_redirect off;

    root   /usr/share/nginx/html;
    index  index.html index.htm;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    error_page 404 /404.html;
    location = /404.html {
            root /usr/share/nginx/html;
            internal;
    }

    if ($landing_redirect != "") {
            return 302 $landing_redirect;
    }

    location / {
            try_files $uri $uri/index.html =404;
    }
  }
}